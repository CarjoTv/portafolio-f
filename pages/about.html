<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Proyectos - Anthony Olguin</title>
    <link rel="stylesheet" href="/css/styles.css">
   <script type="module" src="/js/proyectos.js" defer></script>
</head>
<body class="bg-[#0e1219] text-white overflow-x-hidden">

    <header class="relative z-50"> 
        <div class="fixed top-0 right-0 left-0 bg-[#18202e]/90 flex items-center justify-between px-6 md:px-12 py-4 text-white z-50">
            <div class="shrink-0"> 
                <img src="/images/logo.png" alt="Logo" class="w-12 h-12">
            </div>

            <nav class="flex items-center justify-end flex-1 gap-4">
                <ul id="menu-list" class="flex flex-row gap-8 font-medium">
                    <li><a href="/" class="hover:text-amber-200 transition">INICIO</a></li>
                    <li><a href="about.html" class="text-amber-200 border-b-2 border-amber-200">PROYECTOS</a></li>
                </ul>
                
                <div class="hidden sm:flex shrink-0">
                    <a href="/#contacto" class="border border-amber-50 rounded-3xl p-1 pl-4 flex items-center cursor-pointer hover:bg-white/10 group">
                        <span class="text-sm font-bold mr-2">CONTACTO</span> 
                        <div class="rounded-full bg-[#ddeb9a] w-8 h-8 flex items-center justify-center group-hover:rotate-45 transition-transform">
                            <img src="/images/arrow_finally.png" class="w-4 h-4">
                        </div>
                    </a>
                </div>
            </nav>
        </div>
    </header>

    <main class="relative min-h-screen pt-44 pb-20 px-6 md:px-12">
        <div class="max-w-7xl mx-auto">
            
            <header class="mb-16">
                <h1 class="text-7xl font-bold leading-tight uppercase italic">
                    Mis <span class="text-amber-200">Trabajos</span>
                </h1>
            </header>

            <div id="contenedor-proyectos" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                </div>

        </div>
    </main>

</body>
</html>
